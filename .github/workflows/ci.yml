name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions:
  contents: read

jobs:
  test:
    name: Elixir ${{ matrix.elixir }} / OTP ${{ matrix.otp }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          # Elixir 1.19.5 supports OTP 26-28
          - elixir: "1.19.5"
            otp: "28.4.1"
          - elixir: "1.19.5"
            otp: "27.3.4"
          - elixir: "1.19.5"
            otp: "26.2.5"
          # Elixir 1.18.4 supports OTP 26-27
          - elixir: "1.18.4"
            otp: "27.3.4"
          - elixir: "1.18.4"
            otp: "26.2.5"
          # Elixir 1.17.3 supports OTP 25-27
          - elixir: "1.17.3"
            otp: "27.3.4"
          - elixir: "1.17.3"
            otp: "26.2.5"
          - elixir: "1.17.3"
            otp: "25.3.2"

    steps:
      - uses: actions/checkout@v4

      - uses: erlef/setup-beam@v1
        id: setup-beam
        with:
          elixir-version: ${{ matrix.elixir }}
          otp-version: ${{ matrix.otp }}

      - name: Cache deps
        uses: actions/cache@v4
        with:
          path: deps
          key: deps-${{ runner.os }}-${{ matrix.elixir }}-${{ matrix.otp }}-${{ hashFiles('mix.lock') }}
          restore-keys: |
            deps-${{ runner.os }}-${{ matrix.elixir }}-${{ matrix.otp }}-

      - name: Cache _build
        uses: actions/cache@v4
        with:
          path: _build
          key: build-${{ runner.os }}-${{ matrix.elixir }}-${{ matrix.otp }}-${{ hashFiles('mix.lock') }}-${{ hashFiles('lib/**/*.ex') }}
          restore-keys: |
            build-${{ runner.os }}-${{ matrix.elixir }}-${{ matrix.otp }}-${{ hashFiles('mix.lock') }}-
            build-${{ runner.os }}-${{ matrix.elixir }}-${{ matrix.otp }}-

      - name: Install dependencies
        run: mix deps.get

      - name: Compile
        run: mix compile --warnings-as-errors

      - name: Run tests
        run: mix test
